# ==============================================================================
# 🔒 Reusable Workflow: Dependency security audit (pip-audit)
# ==============================================================================
# USAGE — call this from your project repo:
#
#   jobs:
#     audit:
#       uses: vertex-ai-automations/shared-workflows/.github/workflows/audit.yml@main
#       with:
#         install-command: 'pip install -e ".[test]"'
#
# RECOMMENDED TRIGGERS:
#   on:
#     pull_request:
#       branches: [main]
#     schedule:
#       - cron: '0 9 * * 1'   # every Monday at 09:00 UTC
#
# SUPPRESSING KNOWN VULNERABILITIES:
#   Pass pip-audit-args to ignore a specific advisory while it is being
#   resolved upstream:
#     pip-audit-args: '--ignore-vuln GHSA-xxxx-yyyy-zzzz'
#
# NOTES:
#   - Installs the project, then scans the full environment (all transitive deps)
#   - The job fails on any unfixed vulnerability
#   - pip-audit is installed separately so it is never pinned into the project
# ==============================================================================

name: 🔒 Security Audit

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for the runner"
        type: string
        default: "3.11"
      install-command:
        description: "Command to install the package and its dependencies before auditing"
        type: string
        default: 'pip install -e "."'
      pip-audit-args:
        description: "Extra arguments passed to pip-audit (e.g. '--ignore-vuln GHSA-xxxx-yyyy-zzzz')"
        type: string
        default: ""
      working-directory:
        description: "Working directory (monorepo support)"
        type: string
        default: "."

  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"

permissions:
  contents: read

jobs:
  audit:
    name: 🔒 pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for setuptools_scm during install
          fetch-tags: true # required for setuptools_scm to resolve version from tags

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}
          cache: 'pip'
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: 📦 Install project dependencies
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.install-command || 'pip install -e "."' }}

      - name: 🔒 Install pip-audit
        run: python -m pip install pip-audit

      - name: 🔍 Run security audit
        env:
          PIP_AUDIT_ARGS: ${{ inputs.pip-audit-args }}
        run: pip-audit $PIP_AUDIT_ARGS
