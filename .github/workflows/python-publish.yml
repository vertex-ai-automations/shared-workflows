# ==============================================================================
# 📦 Reusable Workflow: Build and Publish Python Package to PyPI
# ==============================================================================
# USAGE — call this from your project repo's release workflow:
#
#   on:
#     push:
#       tags: ["*.*.*"]     # bare SemVer e.g. 1.2.1
#
#   jobs:
#     publish:
#       uses: vertex-ai-automations/shared-workflows/.github/workflows/python-publish.yml@main
#       with:
#         python-version: '3.11'
#         run-tests: true
#         test-command: 'pytest tests/ -v'
#         publish-target: 'both'     # 'pypi' | 'testpypi' | 'both'
#       secrets: inherit
#
# PUBLISH TARGET FLAG:
#   publish-target controls which registries receive the built package:
#
#   'pypi'     → publishes to pypi.org only        (uses Trusted Publishing)
#   'testpypi' → publishes to test.pypi.org only   (uses TEST_PYPI_API_TOKEN)
#   'both'     → publishes to testpypi first, then pypi (default)
#
# PERMISSIONS:
#   Declared inside this workflow — callers do NOT need permissions blocks.
#
# SECRETS:
#   PYPI_API_TOKEN      — pypi.org token        (required if Trusted Publishing not set up)
#   TEST_PYPI_API_TOKEN — test.pypi.org token   (required when target is 'testpypi' or 'both')
#   Pass via: secrets: inherit  (recommended — shares all project repo secrets)
#
# NOTES:
#   - Version is derived from the git tag via setuptools_scm (no static version in pyproject.toml)
#   - All jobs are tag-gated — this workflow skips cleanly on non-tag pushes
#   - Artifact name is auto-derived from the repo name e.g. "custom-logger-dist"
#
# SETUP (Trusted Publishing on pypi.org):
#   pypi.org → your project → Publishing → Add publisher
#     owner=vertex-ai-automations, repo=your-repo, workflow=release.yml, env=pypi
#
# SETUP (TestPyPI token):
#   Generate at test.pypi.org/manage/account/token/
#   Add to project repo as secret: TEST_PYPI_API_TOKEN
# ==============================================================================

name: 📦 Build and Publish Python Package to PyPI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version used to build the package"
        type: string
        default: "3.11"
      run-tests:
        description: "Run tests before publishing"
        type: boolean
        default: true
      test-command:
        description: "Command to run tests (if run-tests is true)"
        type: string
        default: "pytest"
      publish-target:
        description: >
          Controls which registry the package is published to.
          'pypi'     — publish to pypi.org only (uses Trusted Publishing by default)
          'testpypi' — publish to test.pypi.org only (uses TEST_PYPI_API_TOKEN)
          'both'     — publish to testpypi first, then pypi (default)
        type: string
        default: "both"
      use-trusted-publishing:
        description: >
          Use OIDC Trusted Publishing for the pypi.org target.
          Set false to use PYPI_API_TOKEN instead.
          TestPyPI always uses TEST_PYPI_API_TOKEN regardless of this flag.
        type: boolean
        default: true
      working-directory:
        description: "Working directory (monorepo support)"
        type: string
        default: "."
    secrets:
      PYPI_API_TOKEN:
        description: "pypi.org API token — only required if use-trusted-publishing is false"
        required: false
      TEST_PYPI_API_TOKEN:
        description: "test.pypi.org API token — required when publish-target is 'testpypi' or 'both'"
        required: false

  # Allow manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      publish-target:
        description: "Target registry"
        type: choice
        options:
          - "both"
          - "pypi"
          - "testpypi"
        default: "both"
      use-trusted-publishing:
        description: "Use OIDC Trusted Publishing for PyPI (false = use token)"
        type: boolean
        default: true

# Permissions declared here — callers do NOT need permissions blocks.
# contents: read  — checkout
# id-token: write — OIDC Trusted Publishing (scoped to publish-pypi job only)
permissions:
  contents: read
  id-token: write

# TAG GUARD — enforced on every job below.
# setuptools_scm derives the version from the git tag. A non-tag commit
# produces ".devN+gABCDEF" which PyPI and TestPyPI both reject.
# Callers never need to add tag conditions — non-tag pushes skip cleanly.

jobs:

  # ============================================================
  # JOB 1: Validate the release tag (setuptools_scm aware)
  # ============================================================
  validate-version:
    name: ✅ Validate Release Tag (setuptools_scm)
    if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 📦 Install setuptools_scm
        run: pip install setuptools_scm --quiet

      - name: 🏷️ Validate tag and resolved version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "🏷️  Git tag         : $GITHUB_REF_NAME"
          echo "🏷️  Tag version     : $TAG_VERSION"
          echo "🎯  Publish target  : ${{ inputs.publish-target || 'both' }}"

          # 1. Assert tag is clean SemVer X.Y.Z
          if ! echo "$TAG_VERSION" | grep -Pq '^\d+\.\d+\.\d+$'; then
            echo "❌ Tag '$TAG_VERSION' is not valid SemVer (expected X.Y.Z)"
            echo "   Ensure the tag has no pre-release or build suffixes."
            exit 1
          fi

          # 2. Resolve version via setuptools_scm
          SCM_VERSION=$(python -c "from setuptools_scm import get_version; print(get_version())" 2>/dev/null || echo "")

          if [ -z "$SCM_VERSION" ]; then
            echo "❌ setuptools_scm could not resolve a version."
            echo "   Ensure the tag '$GITHUB_REF_NAME' is pushed before the workflow runs."
            exit 1
          fi

          echo "📦 setuptools_scm  : $SCM_VERSION"

          # 3. Assert resolved version matches the tag exactly
          if [ "$SCM_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   Tag version      : $TAG_VERSION"
            echo "   Resolved version : $SCM_VERSION"
            echo ""
            echo "   setuptools_scm appended a dev suffix — the tag is likely not on HEAD."
            echo "   Delete the tag, ensure HEAD is the release commit, then re-tag:"
            echo "   git tag $TAG_VERSION && git push origin $TAG_VERSION"
            exit 1
          fi

          echo "✅ Tag '$TAG_VERSION' is clean SemVer and resolves correctly"

  # ============================================================
  # JOB 2: Run tests
  # ============================================================
  test:
    name: 🧪 Run Tests
    if: |
      startsWith(github.ref, 'refs/tags/') &&
      !startsWith(github.ref, 'refs/tags/v') &&
      inputs.run-tests != false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-pip-${{ runner.os }}-${{ inputs.python-version || '3.11' }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            test-pip-${{ runner.os }}-${{ inputs.python-version || '3.11' }}-

      - name: 📦 Install package + test dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev,test]" 2>/dev/null || pip install ".[test]" 2>/dev/null || pip install -e "."
          pip install pytest 2>/dev/null || true

      - name: 🧪 Run tests
        run: ${{ inputs.test-command || 'pytest' }}

  # ============================================================
  # JOB 3: Build the distribution
  # ============================================================
  build:
    name: 🏗️ Build Package
    needs: [validate-version, test]
    if: |
      always() &&
      needs.validate-version.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}

    steps:
      - name: 🔄 Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 🏷️ Set artifact name
        id: set-artifact-name
        run: echo "name=${{ github.event.repository.name }}-dist" >> $GITHUB_OUTPUT

      - name: 📦 Install build tools
        run: pip install --upgrade pip build twine

      - name: 🧱 Build sdist and wheel
        run: python -m build

      - name: 🔍 Confirm built version
        run: |
          BUILT_VERSION=$(python -c "
          import glob, re
          wheels = glob.glob('dist/*.whl')
          if wheels:
              match = re.search(r'-(\d+\.\d+\.\d+)-', wheels[0])
              print(match.group(1) if match else 'unknown')
          ")
          echo "🏷️  Version in built wheel: $BUILT_VERSION"

      - name: 🧪 Validate package metadata
        run: twine check dist/*

      - name: 🗃️ Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: ${{ inputs.working-directory || '.' }}/dist/
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # JOB 4: Publish to TestPyPI
  # Runs when publish-target is 'testpypi' or 'both'
  # Always uses TEST_PYPI_API_TOKEN — no Trusted Publishing for TestPyPI
  # ============================================================
  publish-testpypi:
    name: 🧪 Publish to TestPyPI
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/') &&
      !startsWith(github.ref, 'refs/tags/v') &&
      (inputs.publish-target == 'testpypi' || inputs.publish-target == 'both')
    runs-on: ubuntu-latest
    environment:
      name: test-pypi
      url: https://test.pypi.org/p/${{ github.event.repository.name }}

    steps:
      - name: 🗃️ Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 📦 Install twine
        run: pip install --upgrade twine

      - name: 🔐 Confirm target
        run: |
          echo "📡 Publishing to : TestPyPI (https://test.pypi.org)"
          echo "🏷️  Artifact      : ${{ needs.build.outputs.artifact-name }}"

      - name: 📤 Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://test.pypi.org/legacy/
        run: twine upload dist/*

  # ============================================================
  # JOB 5: Publish to PyPI
  # Runs when publish-target is 'pypi' or 'both'
  # When target is 'both', waits for TestPyPI to succeed first
  # Uses Trusted Publishing by default; falls back to PYPI_API_TOKEN
  # ============================================================
  publish-pypi:
    name: 🚀 Publish to PyPI
    needs: [build, publish-testpypi]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.publish-testpypi.result == 'success' || needs.publish-testpypi.result == 'skipped') &&
      startsWith(github.ref, 'refs/tags/') &&
      !startsWith(github.ref, 'refs/tags/v') &&
      (inputs.publish-target == 'pypi' || inputs.publish-target == 'both')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}
    permissions:
      id-token: write   # Scoped here — only this job needs OIDC

    steps:
      - name: 🗃️ Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: 🔐 Confirm target
        run: |
          echo "📡 Publishing to : PyPI (https://pypi.org)"
          echo "🏷️  Artifact      : ${{ needs.build.outputs.artifact-name }}"
          echo "🔑 Auth method   : ${{ inputs.use-trusted-publishing != false && 'OIDC Trusted Publishing' || 'API Token' }}"

      # --- Path A: Trusted Publishing (default) ---
      - name: 📤 Publish to PyPI (Trusted Publishing)
        if: inputs.use-trusted-publishing != false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/

      # --- Path B: API token fallback ---
      - name: 🐍 Set up Python (token path)
        if: inputs.use-trusted-publishing == false
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 📦 Install twine (token path)
        if: inputs.use-trusted-publishing == false
        run: pip install --upgrade twine

      - name: 📤 Publish to PyPI (API Token)
        if: inputs.use-trusted-publishing == false
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: https://upload.pypi.org/legacy/
        run: twine upload dist/*
