# ==============================================================================
# 📦 Reusable Workflow: Build and Publish Python Package to PyPI
# ==============================================================================
# USAGE — call this from your project repo's release workflow:
#
#   on:
#     push:
#       tags: ["*.*.*"]       # bare SemVer e.g. 1.2.1
#
#   jobs:
#
#     # 🧪 Publish to TestPyPI on every merge to main
#     test-publish:
#       if: github.ref == 'refs/heads/main'
#       uses: vertex-ai-automations/shared-workflows/.github/workflows/python-publish.yml@main
#       permissions:
#         contents: read
#         id-token: write
#       with:
#         python-version: '3.11'
#         run-tests: true
#         test-command: 'pytest tests/ -v'
#         use-trusted-publishing: false
#         repository-url: 'https://test.pypi.org/legacy/'
#       secrets:
#         PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
#
#     # 🚀 Publish to PyPI on SemVer tag e.g. 1.2.1
#     publish:
#       if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
#       uses: vertex-ai-automations/shared-workflows/.github/workflows/python-publish.yml@main
#       permissions:
#         contents: read
#         id-token: write
#       with:
#         python-version: '3.11'
#         run-tests: true
#         test-command: 'pytest tests/ -v'
#         use-trusted-publishing: true
#       secrets: inherit
#
# NOTE: The build artifact name is automatically derived from the calling
#       repository name (e.g. "custom-logger-dist"). No manual configuration needed.
#
# SECRETS:
#   PYPI_API_TOKEN      — real PyPI token (pypi.org)
#   TEST_PYPI_API_TOKEN — TestPyPI token (test.pypi.org)
#
#   Both secrets live in your PROJECT repo, not here.
#   In your caller workflow, map the right secret:
#     For TestPyPI: secrets: { PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }} }
#     For PyPI:     secrets: inherit  (uses PYPI_API_TOKEN directly)
#
# SETUP (Trusted Publishing — recommended for PyPI):
#   1. Go to pypi.org → your project → Publishing → Add a publisher
#   2. Set: owner=vertex-ai-automations, repo=your-repo, workflow=release.yml, env=pypi
#
# SETUP (Token fallback — required for TestPyPI unless separately configured):
#   1. Generate tokens at pypi.org and test.pypi.org independently
#   2. Store in project repo secrets as PYPI_API_TOKEN and TEST_PYPI_API_TOKEN
# ==============================================================================

name: 📦 Build and Publish Python Package to PyPI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version used to build the package"
        type: string
        default: "3.11"
      run-tests:
        description: "Run tests before publishing"
        type: boolean
        default: true
      test-command:
        description: "Command to run tests (if run-tests is true)"
        type: string
        default: "pytest"
      use-trusted-publishing:
        description: >
          Use OIDC Trusted Publishing (recommended for PyPI).
          Set false to use the PYPI_API_TOKEN secret instead.
          Always set false when targeting TestPyPI unless you have a
          separate Trusted Publisher registered there.
        type: boolean
        default: true
      repository-url:
        description: >
          Target registry URL.
          PyPI (default): https://upload.pypi.org/legacy/
          TestPyPI:       https://test.pypi.org/legacy/
        type: string
        default: "https://upload.pypi.org/legacy/"
      working-directory:
        description: "Working directory (monorepo support)"
        type: string
        default: "."
    secrets:
      PYPI_API_TOKEN:
        description: >
          API token for the target registry.
          For PyPI:     pass ${{ secrets.PYPI_API_TOKEN }}
          For TestPyPI: pass ${{ secrets.TEST_PYPI_API_TOKEN }}
          Map the correct secret in your caller workflow.
          Only required when use-trusted-publishing is false.
        required: false

  # Allow manual triggering — useful for ad-hoc TestPyPI releases
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      use-trusted-publishing:
        description: "Use OIDC Trusted Publishing (false = use token)"
        type: boolean
        default: true
      repository-url:
        description: "Target registry URL"
        type: choice
        options:
          - "https://upload.pypi.org/legacy/"
          - "https://test.pypi.org/legacy/"
        default: "https://upload.pypi.org/legacy/"

# Minimal permissions — publish jobs declare id-token conditionally
permissions:
  contents: read

jobs:
  # ============================================================
  # JOB 1: Validate tag matches package version
  # ============================================================
  validate-version:
    name: ✅ Validate Tag vs Package Version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 🏷️ Check tag matches package version
        run: |
          # Extract version from pyproject.toml or setup.cfg
          if [ -f "pyproject.toml" ]; then
            PKG_VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])" 2>/dev/null || \
                          grep -Po '(?<=^version = ")[^"]+' pyproject.toml | head -1)
          elif [ -f "setup.cfg" ]; then
            PKG_VERSION=$(grep -Po '(?<=^version = ).*' setup.cfg | head -1)
          else
            echo "⚠️  No pyproject.toml or setup.cfg found — skipping version check"
            exit 0
          fi

          # Strip leading 'v' if present — supports both 1.2.1 and v1.2.1 tag formats
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "📦 Package version : $PKG_VERSION"
          echo "🏷️  Git tag version  : $TAG_VERSION"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch! Tag '$TAG_VERSION' does not match package version '$PKG_VERSION'"
            echo "   Update the version in pyproject.toml before releasing."
            exit 1
          fi
          echo "✅ Versions match — proceeding with publish"

  # ============================================================
  # JOB 2: Run tests
  # ============================================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    if: ${{ inputs.run-tests != false }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-pip-${{ runner.os }}-${{ inputs.python-version || '3.11' }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            test-pip-${{ runner.os }}-${{ inputs.python-version || '3.11' }}-

      - name: 📦 Install package + test dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev,test]" 2>/dev/null || pip install ".[test]" 2>/dev/null || pip install -e "."
          pip install pytest 2>/dev/null || true

      - name: 🧪 Run tests
        run: ${{ inputs.test-command || 'pytest' }}

  # ============================================================
  # JOB 3: Build the distribution
  # ============================================================
  build:
    name: 🏗️ Build Package
    needs: [validate-version, test]
    # Run even if test was skipped (run-tests: false), but not if it failed
    if: |
      always() &&
      needs.validate-version.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}
    # Expose artifact name as a job output — downstream jobs reference this
    # instead of the workflow-level env var to avoid resolution issues on
    # workflow_dispatch where github.event.repository may differ
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 🏷️ Set artifact name
        id: set-artifact-name
        # Derives from repo name — guarantees uniqueness across all projects
        # e.g. repo "custom-logger" → artifact "custom-logger-dist"
        run: echo "name=${{ github.event.repository.name }}-dist" >> $GITHUB_OUTPUT

      - name: 📦 Install build tools
        run: pip install --upgrade pip build twine

      - name: 🧱 Build sdist and wheel
        run: python -m build

      - name: 🧪 Validate package metadata
        run: twine check dist/*

      - name: 🗃️ Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: ${{ inputs.working-directory || '.' }}/dist/
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # JOB 4A: Publish via OIDC Trusted Publishing (recommended)
  # Use for: PyPI production releases
  # ============================================================
  publish-trusted:
    name: 🚀 Publish (Trusted Publishing)
    needs: build
    if: ${{ inputs.use-trusted-publishing != false }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}
    permissions:
      id-token: write  # Required for OIDC token exchange

    steps:
      - name: 🗃️ Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: 📤 Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ inputs.repository-url || 'https://upload.pypi.org/legacy/' }}

  # ============================================================
  # JOB 4B: Publish via API token
  # Use for: TestPyPI (always), or PyPI if Trusted Publishing is not set up
  #
  # TOKEN ROUTING — handled entirely in the caller workflow:
  #
  #   Publishing to TestPyPI:
  #     secrets:
  #       PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
  #
  #   Publishing to PyPI with token:
  #     secrets:
  #       PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
  #     (or use: secrets: inherit)
  #
  # The reusable workflow always reads secrets.PYPI_API_TOKEN — the caller
  # is responsible for mapping the right secret to that name.
  # ============================================================
  publish-token:
    name: 🚀 Publish (API Token)
    needs: build
    if: ${{ inputs.use-trusted-publishing == false }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: ${{ inputs.repository-url == 'https://test.pypi.org/legacy/' && 'https://test.pypi.org' || format('https://pypi.org/p/{0}', github.event.repository.name) }}

    steps:
      - name: 🗃️ Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 📦 Install twine
        run: pip install --upgrade twine

      - name: 🔐 Confirm target registry
        run: |
          TARGET="${{ inputs.repository-url || 'https://upload.pypi.org/legacy/' }}"
          echo "📡 Publishing to: $TARGET"
          if [[ "$TARGET" == *"test.pypi"* ]]; then
            echo "🧪 Target: TestPyPI"
            echo "   Ensure TEST_PYPI_API_TOKEN was mapped to PYPI_API_TOKEN in your caller workflow."
          else
            echo "🚀 Target: PyPI"
            echo "   Ensure PYPI_API_TOKEN is set in your project repo secrets."
          fi

      - name: 📤 Upload to registry via token
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.repository-url || 'https://upload.pypi.org/legacy/' }}
        run: twine upload dist/*
