# ==============================================================================
# 📦 Reusable Workflow: Build and Publish Python Package to PyPI
# ==============================================================================
# USAGE — call this from your project repo's release workflow:
#
#   on:
#     push:
#       tags: ["*.*.*"]       # bare SemVer e.g. 1.2.1
#
#   jobs:
#
#     # 🧪 Publish to TestPyPI on every merge to main
#     test-publish:
#       if: github.ref == 'refs/heads/main'
#       uses: vertex-ai-automations/shared-workflows/.github/workflows/python-publish.yml@main
#       permissions:
#         contents: read
#         id-token: write
#       with:
#         python-version: '3.11'
#         run-tests: true
#         test-command: 'pytest tests/ -v'
#         use-trusted-publishing: false
#         repository-url: 'https://test.pypi.org/legacy/'
#       secrets:
#         PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
#
#     # 🚀 Publish to PyPI on SemVer tag e.g. 1.2.1
#     publish:
#       if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
#       uses: vertex-ai-automations/shared-workflows/.github/workflows/python-publish.yml@main
#       permissions:
#         contents: read
#         id-token: write
#       with:
#         python-version: '3.11'
#         run-tests: true
#         test-command: 'pytest tests/ -v'
#         use-trusted-publishing: true
#       secrets: inherit
#
# NOTE: The build artifact name is automatically derived from the calling
#       repository name (e.g. "custom-logger-dist"). No manual configuration needed.
#
# NOTE: This workflow supports setuptools_scm versioning. The version is
#       derived from the git tag at build time — no static version field
#       in pyproject.toml is required.
#
# SECRETS:
#   PYPI_API_TOKEN      — real PyPI token (pypi.org)
#   TEST_PYPI_API_TOKEN — TestPyPI token (test.pypi.org)
#
#   Both secrets live in your PROJECT repo, not here.
#   In your caller workflow, map the right secret:
#     For TestPyPI: secrets: { PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }} }
#     For PyPI:     secrets: inherit  (uses PYPI_API_TOKEN directly)
#
# SETUP (Trusted Publishing — recommended for PyPI):
#   1. Go to pypi.org → your project → Publishing → Add a publisher
#   2. Set: owner=vertex-ai-automations, repo=your-repo, workflow=release.yml, env=pypi
#
# SETUP (Token fallback — required for TestPyPI unless separately configured):
#   1. Generate tokens at pypi.org and test.pypi.org independently
#   2. Store in project repo secrets as PYPI_API_TOKEN and TEST_PYPI_API_TOKEN
# ==============================================================================

name: 📦 Build and Publish Python Package to PyPI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version used to build the package"
        type: string
        default: "3.11"
      run-tests:
        description: "Run tests before publishing"
        type: boolean
        default: true
      test-command:
        description: "Command to run tests (if run-tests is true)"
        type: string
        default: "pytest"
      use-trusted-publishing:
        description: >
          Use OIDC Trusted Publishing (recommended for PyPI).
          Set false to use the PYPI_API_TOKEN secret instead.
          Always set false when targeting TestPyPI unless you have a
          separate Trusted Publisher registered there.
        type: boolean
        default: true
      repository-url:
        description: >
          Target registry URL.
          PyPI (default): https://upload.pypi.org/legacy/
          TestPyPI:       https://test.pypi.org/legacy/
        type: string
        default: "https://upload.pypi.org/legacy/"
      working-directory:
        description: "Working directory (monorepo support)"
        type: string
        default: "."
    secrets:
      PYPI_API_TOKEN:
        description: >
          API token for the target registry.
          For PyPI:     pass secrets.PYPI_API_TOKEN in your caller workflow.
          For TestPyPI: pass secrets.TEST_PYPI_API_TOKEN mapped to PYPI_API_TOKEN.
          Only required when use-trusted-publishing is false.
        required: false

  # Allow manual triggering — useful for ad-hoc TestPyPI releases
  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      use-trusted-publishing:
        description: "Use OIDC Trusted Publishing (false = use token)"
        type: boolean
        default: true
      repository-url:
        description: "Target registry URL"
        type: choice
        options:
          - "https://upload.pypi.org/legacy/"
          - "https://test.pypi.org/legacy/"
        default: "https://upload.pypi.org/legacy/"

# Minimal permissions — publish jobs declare id-token conditionally
permissions:
  contents: read

# TAG GUARD — enforced at every job level below.
# This workflow uses setuptools_scm which derives the package version
# from the git tag at build time. Running on a non-tag commit produces
# a ".devN+gABCDEF" dirty version that PyPI and TestPyPI will reject.
#
# Every job carries:
#   if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
#
# This means callers never need to add tag conditions themselves —
# calling this workflow on a branch push skips all jobs cleanly.

jobs:
  # ============================================================
  # JOB 1: Validate the release tag (setuptools_scm aware)
  # ============================================================
  # This project uses setuptools_scm — the package version is derived
  # dynamically from the git tag at build time and written to:
  #   src/custom_logger/_version.py
  #
  # There is no static version = "x.x.x" in pyproject.toml to compare
  # against. Instead this job:
  #   1. Validates the tag is clean SemVer X.Y.Z (no dev/dirty suffixes)
  #   2. Installs setuptools_scm and resolves the version from the tag
  #   3. Asserts the resolved version matches the tag exactly
  #      (a mismatch means the tag landed on a non-HEAD commit)
  # ============================================================
  validate-version:
    name: ✅ Validate Release Tag (setuptools_scm)
    if: startsWith(github.ref, 'refs/tags/') && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout with full history
        uses: actions/checkout@v4
        with:
          # setuptools_scm needs the full git history and all tags to
          # resolve the version correctly — shallow clones return "0.1.dev0"
          fetch-depth: 0
          fetch-tags: true

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 📦 Install setuptools_scm
        run: pip install setuptools_scm --quiet

      - name: 🏷️ Validate tag and resolved version
        run: |
          # Strip leading 'v' if present — supports both 1.2.1 and v1.2.1
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "🏷️  Git tag         : $GITHUB_REF_NAME"
          echo "🏷️  Tag version     : $TAG_VERSION"

          # --- 1. Assert tag is clean SemVer X.Y.Z ---
          # PyPI rejects versions with .devN, +local, or dirty suffixes.
          # setuptools_scm appends these automatically when the tag does
          # not point to an exact commit.
          if ! echo "$TAG_VERSION" | grep -Pq '^\d+\.\d+\.\d+$'; then
            echo "❌ Tag '$TAG_VERSION' is not valid SemVer (expected X.Y.Z)"
            echo "   Ensure the tag contains no pre-release or build suffixes."
            exit 1
          fi

          # --- 2. Resolve version via setuptools_scm ---
          SCM_VERSION=$(python -c "from setuptools_scm import get_version; print(get_version())" 2>/dev/null || echo "")

          if [ -z "$SCM_VERSION" ]; then
            echo "❌ setuptools_scm could not resolve a version."
            echo "   Ensure the tag '$GITHUB_REF_NAME' is pushed before the workflow runs."
            exit 1
          fi

          echo "📦 setuptools_scm  : $SCM_VERSION"

          # --- 3. Assert resolved version matches the tag exactly ---
          # If the tag is not on HEAD, setuptools_scm appends a .devN+gABCDEF
          # suffix which PyPI will reject as a non-canonical version.
          if [ "$SCM_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch!"
            echo "   Tag version      : $TAG_VERSION"
            echo "   Resolved version : $SCM_VERSION"
            echo ""
            echo "   setuptools_scm appended a dev suffix — this usually means"
            echo "   the tag was not placed on the HEAD commit."
            echo "   Delete the tag, ensure HEAD is the intended release commit,"
            echo "   then re-tag: git tag $TAG_VERSION && git push origin $TAG_VERSION"
            exit 1
          fi

          echo "✅ Tag '$TAG_VERSION' is clean SemVer and resolves correctly — proceeding"

  # ============================================================
  # JOB 2: Run tests
  # ============================================================
  test:
    name: 🧪 Run Tests
    if: |
      startsWith(github.ref, 'refs/tags/') &&
      !startsWith(github.ref, 'refs/tags/v') &&
      inputs.run-tests != false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout with full history
        uses: actions/checkout@v4
        with:
          # Full history required so setuptools_scm can resolve the version
          # during package install (pip install -e .)
          fetch-depth: 0
          fetch-tags: true

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-pip-${{ runner.os }}-${{ inputs.python-version || '3.11' }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            test-pip-${{ runner.os }}-${{ inputs.python-version || '3.11' }}-

      - name: 📦 Install package + test dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev,test]" 2>/dev/null || pip install ".[test]" 2>/dev/null || pip install -e "."
          pip install pytest 2>/dev/null || true

      - name: 🧪 Run tests
        run: ${{ inputs.test-command || 'pytest' }}

  # ============================================================
  # JOB 3: Build the distribution
  # ============================================================
  build:
    name: 🏗️ Build Package
    needs: [validate-version, test]
    # Run even if test was skipped (run-tests: false), but not if it failed
    if: |
      always() &&
      needs.validate-version.result == 'success' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.name }}

    steps:
      - name: 🔄 Checkout with full history
        uses: actions/checkout@v4
        with:
          # Full history + tags required for setuptools_scm to stamp the
          # correct version into the built wheel and sdist
          fetch-depth: 0
          fetch-tags: true

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 🏷️ Set artifact name
        id: set-artifact-name
        # Derives from repo name — guarantees uniqueness across all projects
        # e.g. repo "custom-logger" → artifact "custom-logger-dist"
        run: echo "name=${{ github.event.repository.name }}-dist" >> $GITHUB_OUTPUT

      - name: 📦 Install build tools
        run: pip install --upgrade pip build twine

      - name: 🧱 Build sdist and wheel
        run: python -m build

      - name: 🔍 Confirm built version
        # Sanity check — print the version baked into the wheel by setuptools_scm
        run: |
          BUILT_VERSION=$(python -c "
          import glob, re
          wheels = glob.glob('dist/*.whl')
          if wheels:
              match = re.search(r'-(\d+\.\d+\.\d+)-', wheels[0])
              print(match.group(1) if match else 'unknown')
          ")
          echo "🏷️  Version in built wheel: $BUILT_VERSION"

      - name: 🧪 Validate package metadata
        run: twine check dist/*

      - name: 🗃️ Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.name }}
          path: ${{ inputs.working-directory || '.' }}/dist/
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # JOB 4A: Publish via OIDC Trusted Publishing (recommended)
  # Use for: PyPI production releases
  # ============================================================
  publish-trusted:
    name: 🚀 Publish (Trusted Publishing)
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/') &&
      !startsWith(github.ref, 'refs/tags/v') &&
      inputs.use-trusted-publishing != false
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}
    permissions:
      id-token: write  # Required for OIDC token exchange

    steps:
      - name: 🗃️ Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: 📤 Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ inputs.repository-url || 'https://upload.pypi.org/legacy/' }}

  # ============================================================
  # JOB 4B: Publish via API token
  # Use for: TestPyPI (always), or PyPI if Trusted Publishing is not set up
  #
  # TOKEN ROUTING — handled entirely in the caller workflow:
  #
  #   Publishing to TestPyPI:
  #     secrets:
  #       PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
  #
  #   Publishing to PyPI with token:
  #     secrets:
  #       PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
  #     (or use: secrets: inherit)
  #
  # The reusable workflow always reads secrets.PYPI_API_TOKEN — the caller
  # is responsible for mapping the right secret to that name.
  # ============================================================
  publish-token:
    name: 🚀 Publish (API Token)
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/') &&
      !startsWith(github.ref, 'refs/tags/v') &&
      inputs.use-trusted-publishing == false
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: ${{ inputs.repository-url == 'https://test.pypi.org/legacy/' && 'https://test.pypi.org' || format('https://pypi.org/p/{0}', github.event.repository.name) }}

    steps:
      - name: 🗃️ Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: 📦 Install twine
        run: pip install --upgrade twine

      - name: 🔐 Confirm target registry
        run: |
          TARGET="${{ inputs.repository-url || 'https://upload.pypi.org/legacy/' }}"
          echo "📡 Publishing to: $TARGET"
          if [[ "$TARGET" == *"test.pypi"* ]]; then
            echo "🧪 Target: TestPyPI"
            echo "   Ensure TEST_PYPI_API_TOKEN was mapped to PYPI_API_TOKEN in your caller workflow."
          else
            echo "🚀 Target: PyPI"
            echo "   Ensure PYPI_API_TOKEN is set in your project repo secrets."
          fi

      - name: 📤 Upload to registry via token
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_REPOSITORY_URL: ${{ inputs.repository-url || 'https://upload.pypi.org/legacy/' }}
        run: twine upload dist/*
