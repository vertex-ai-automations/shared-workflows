# ==============================================================================
# 🔎 Reusable Workflow: Static type checking (mypy)
# ==============================================================================
# USAGE — call this from your project repo:
#
#   jobs:
#     typecheck:
#       uses: vertex-ai-automations/shared-workflows/.github/workflows/typecheck.yml@main
#       with:
#         install-command: 'pip install -e ".[dev]"'
#         typecheck-command: 'mypy src/ --strict'
#
# NOTES:
#   - typecheck-command defaults to mypy but accepts any checker
#     (e.g. 'pyright', 'basedpyright src/')
#   - The type checker must be included in the extras installed by install-command
#   - fetch-depth: 0 is set so setuptools_scm can derive the version during install
# ==============================================================================

name: 🔎 Type Check

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for the runner"
        type: string
        default: "3.11"
      typecheck-command:
        description: "Command to run the type checker (e.g. 'mypy src/', 'pyright', 'basedpyright src/')"
        type: string
        default: "mypy src/"
      install-command:
        description: "Command to install the package and type-check dependencies"
        type: string
        default: 'pip install -e ".[dev]"'
      working-directory:
        description: "Working directory (monorepo support)"
        type: string
        default: "."

  workflow_dispatch:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      typecheck-command:
        description: "Type checker command"
        type: string
        default: "mypy src/"
      install-command:
        description: "Install command"
        type: string
        default: 'pip install -e ".[dev]"'

permissions:
  contents: read

jobs:
  typecheck:
    name: 🔎 Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory || '.' }}

    steps:
      - name: 🔄 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for setuptools_scm during install

      - name: 🐍 Set up Python ${{ inputs.python-version || '3.11' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}
          cache: 'pip'
          cache-dependency-path: |
            **/pyproject.toml
            **/requirements*.txt

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          ${{ inputs.install-command || 'pip install -e ".[dev]"' }}

      - name: 🔎 Run type checker
        run: ${{ inputs.typecheck-command || 'mypy src/' }}
